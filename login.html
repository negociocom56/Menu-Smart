<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bocado | Acceso Admin</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3075/3075977.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-box">
            <div class="brand-logo" style="margin:0 auto 16px;width:56px;height:56px;font-size:1.5rem;">B</div>
            <h2>Acceso al Panel</h2>
            <form id="login-form">
                <div class="form-group" style="text-align:left;">
                    <label>USUARIO</label>
                    <input type="text" id="user" placeholder="admin" required>
                </div>
                <div class="form-group" style="text-align:left;">
                    <label>CONTRASEÑA</label>
                    <input type="password" id="pass" placeholder="••••••••" required>
                </div>
                <p id="error-msg" class="error-msg">Usuario o contraseña incorrectos.</p>
                <button type="submit" class="btn-save" style="margin-top:16px;">INGRESAR</button>
            </form>
            <a href="index.html" style="display:block;margin-top:20px;color:var(--text-muted);font-size:0.8rem;text-decoration:none;">← Volver al Menú</a>
        </div>
    </div>
    <script>
        document.getElementById('login-form').onsubmit = (e) => {
            e.preventDefault();
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if (u === 'admin' && p === 'bocado2026') {
                sessionStorage.setItem('bocado_auth', 'true');
                window.location.href = 'admin.html';
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        };
    </script>
</body>
</html>
